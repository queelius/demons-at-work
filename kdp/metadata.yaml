---
title: "Demons at Work"
author: "Alex Towell"
lang: en-US
description: |
  A mid-career demon in hell's Hauntings department gets what looks
  like the assignment of his career: a 1920s bungalow with perfect
  acoustics, owned by a quietly grieving widower named Gordon. The
  kind of canvas a craftsperson waits decades for.

  The horror is real. The demon is good at this. The set pieces are
  genuinely unnerving.

  Then the demon notices who he is haunting. A retired English teacher
  reading his dead wife's last book aloud to an empty room, one
  evening a week, picking up where her bookmark was.

  The demon finishes the job anyway. The craft is the point.

  A satirical horror novella about professional pride, meaningless
  work done well, and the quiet dignity of haunting someone who is
  already haunted.
